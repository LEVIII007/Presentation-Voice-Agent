services:
  voice-slides:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: ./server/.env
        required: false
    environment:
      PORT: 5173
      DATA_DIR: /app/runtime-data
    ports:
      - "${VOICE_SLIDES_PORT:-5173}:5173"
    volumes:
      - voice_slides_data:/app/runtime-data
    restart: unless-stopped

volumes:
  voice_slides_data:
